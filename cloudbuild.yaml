# cloudbuild.yaml
#
# Automated Cloud Run deployment triggered on git push.
# Repository : github.com/aryan-madhavi/VoiceSewa
# Branch     : backend/features/auto-translate-call
#
# Manual submit:
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions=_REGION=asia-south1,_SERVICE_NAME=voicesewa-call-translate,_GCP_PROJECT=voicesewa,SHORT_SHA=latest \
#     --project=voicesewa

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: voicesewa-call-translate
  _GCP_PROJECT: voicesewa

steps:
  # ── Step 1: Build image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_GCP_PROJECT}/docker-images/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${_GCP_PROJECT}/docker-images/${_SERVICE_NAME}:latest
      - .

  # ── Step 2: Push to Artifact Registry ─────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_GCP_PROJECT}/docker-images/${_SERVICE_NAME}

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${_GCP_PROJECT}/docker-images/${_SERVICE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated  # Auth enforced at app layer (routes.js + wsHandler.js)
                               # so /health is publicly reachable for monitoring
      - --min-instances=1      # CRITICAL: keeps one instance always warm.
                               # With min=0, POST /session and WS /ws can hit
                               # different instances → SESSION_NOT_FOUND.
                               # Sessions are in-memory; they don't survive
                               # instance switches. min=1 ensures all requests
                               # go to the same instance during normal load.
                               # At scale you'd need Redis for session storage,
                               # but for now this is the correct fix.
      - --max-instances=10
      - --concurrency=80
      - --cpu=1
      - --memory=512Mi
      - --session-affinity     # Keeps a given client on the same instance once
                               # connected (via GCILB cookie). But Flutter's http
                               # package doesn't persist cookies, so session
                               # affinity alone is NOT sufficient — min=1 is.
      - --timeout=3600
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${_GCP_PROJECT},NODE_ENV=production
      - --service-account=voicesewa-call-translate@${_GCP_PROJECT}.iam.gserviceaccount.com

images:
  - ${_REGION}-docker.pkg.dev/${_GCP_PROJECT}/docker-images/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${_GCP_PROJECT}/docker-images/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY