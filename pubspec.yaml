name: call_translate
description: >
  Standalone auto-translate call feature for VoiceSewa.
  Fully self-contained Riverpod feature module.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.10

  # ── Audio ─────────────────────────────────────────────────────────────────
  record: ^5.2.1
  just_audio: ^0.9.46

  # ── Networking ────────────────────────────────────────────────────────────
  web_socket_channel: ^3.0.1
  http: ^1.2.2

  # ── Notifications ─────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.4
  permission_handler: ^11.4.0

  # ── Routing ───────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Models ────────────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4

# Force analyzer_plugin to a version compatible with analyzer 7.x
# custom_lint_core (transitive) was pinning it to 0.12.0 which breaks
# build_runner's compile step on Dart 3.10 / analyzer 7.6.0
dependency_overrides:
  analyzer_plugin: ^0.13.0

  # record_linux 0.7.x missing startStream + wrong hasPermission signature
  # record 5.2.x requires record_linux ^1.0.0
  record_linux: ^1.0.0

flutter:
  uses-material-design: true